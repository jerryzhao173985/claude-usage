name: Claude2x
options:
  bundleIdPrefix: com.claude2x
  createIntermediateGroups: true

targets:
  # ── iOS App ──
  Claude2xApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Claude2xApp/Sources
      - path: Claude2xApp/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Claude2xApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.claude2x.notifier.ios
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: Claude2xWidgetExtension

  # ── iOS Widget Extension ──
  Claude2xWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Claude2xWidget
      - path: Claude2xApp/Sources/Claude2xLogic.swift
      - path: Claude2xApp/Sources/Claude2xActivityAttributes.swift
    settings:
      base:
        INFOPLIST_FILE: Claude2xWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.claude2x.notifier.ios.widget
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        SKIP_INSTALL: true
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  # ── watchOS App ──
  Claude2xWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Claude2xWatch/Sources
      - path: Claude2xWatch/Assets.xcassets
      - path: Claude2xApp/Sources/Claude2xLogic.swift
      - path: Claude2xApp/Sources/NotificationManager.swift
    settings:
      base:
        INFOPLIST_FILE: Claude2xWatch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.claude2x.notifier.ios.watch
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: Claude2xWatchWidgetExtension

  # ── watchOS Widget Extension ──
  Claude2xWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Claude2xWatchWidget
      - path: Claude2xApp/Sources/Claude2xLogic.swift
    settings:
      base:
        INFOPLIST_FILE: Claude2xWatchWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.claude2x.notifier.ios.watch.widget
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        SKIP_INSTALL: true
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

schemes:
  Claude2xApp:
    build:
      targets:
        Claude2xApp: all
        Claude2xWidgetExtension: all
    run:
      config: Debug

  Claude2xWatch:
    build:
      targets:
        Claude2xWatch: all
        Claude2xWatchWidgetExtension: all
    run:
      config: Debug
